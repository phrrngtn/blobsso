#
# Self-hosted build on the Forgejo fleet (dc1 + this Mac).
# GitHub ignores .forgejo/; the GitHub Actions multi-arch matrix lives in
# .github/workflows/. Runner labels: ubuntu-latest/linux-x86_64 -> dc1
# (docker://blob-builder), macos-arm64 -> this Mac (host).
# NOTE: this Forgejo has DEFAULT_ACTIONS_URL=self, so actions must use a full
# URL (https://code.forgejo.org/...), matching the sibling blob* repos.
#
name: build (self-hosted)

on:
  push:
    paths-ignore: ['**.md', 'docs/**', 'LICENSE']
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: linux-x86_64, runner: ubuntu-latest }
          - { arch: macos-arm64, runner: macos-arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout (with submodules)
        uses: https://code.forgejo.org/actions/checkout@v4
        with:
          submodules: recursive

      - name: Build extension
        run: make

      - name: Test
        run: make test
